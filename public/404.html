<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecionando...</title>
    <script>
        // Redireciona 404 para index.html para SPA funcionar
        const path = window.location.pathname.replace('/Site-Ana', '');
        const hash = window.location.hash || '#/';
        window.location.href = '/Site-Ana/?redirect=' + encodeURIComponent(path + hash);
    </script>
</head>
<body>
    <p>Redirecionando...</p>
</body>
</html>
